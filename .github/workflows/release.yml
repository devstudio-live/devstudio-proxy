name: Release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

concurrency:
  group: release-formula-update
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Debug - List files
        run: ls -R

      - uses: actions/setup-go@v6
        with:
          go-version-file: src/go.mod
          cache-dependency-path: src/go.sum

      - name: Download dependencies
        working-directory: src
        run: go mod download

      - name: Build all platforms
        working-directory: src
        run: |
          VERSION="${{ github.ref_name }}"
          make full VERSION="${VERSION}"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src/dist/devproxy-*
            src/dist/checksums.txt
          generate_release_notes: true

      - name: Update formula SHA256 values
        run: |
          DIST="src/dist"
          FORMULA="Formula/devstudio-proxy.rb"
          VERSION="${{ github.ref_name }}"

          get_sha() {
            grep "^[a-f0-9]*  $1$" "${DIST}/checksums.txt" | awk '{print $1}'
          }

          update_sha() {
            local file="$1"
            local sha
            sha=$(get_sha "${file}")
            sed -i "/${file}/{n;s/sha256 \"[^\"]*\"/sha256 \"${sha}\"/}" "${FORMULA}"
          }

          sed -i "s|version \".*\"|version \"${VERSION#v}\"|" "${FORMULA}"

          update_sha devproxy-darwin-arm64
          update_sha devproxy-darwin-amd64
          update_sha devproxy-linux-arm64
          update_sha devproxy-linux-arm
          update_sha devproxy-linux-amd64
          update_sha devproxy-linux-386

      - name: Commit updated formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: update formula checksums for ${{ github.ref_name }}"
          for attempt in 1 2 3; do
            git fetch origin main
            git rebase origin/main
            git push origin HEAD:main && break
            echo "Push attempt ${attempt} failed, retrying..."
            sleep 2
          done
